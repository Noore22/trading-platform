version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: trading_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: trading_platform_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trading_platform
      - SECRET_KEY=d3b07384d113edec49eaa6238ad5ff00b798782fba79f225eb5cb181289196b0
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_CHAT_ID=
    depends_on:
      - db

  # Next.js Web Dashboard Service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: trading_platform_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend

volumes:
  postgres_data:
